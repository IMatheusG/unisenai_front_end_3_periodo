<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Informações Pessoais</title>
    </head>
    <body>
        <a href="index.html">Home</a>
        <h1>Informações Pessoais</h1>
        
        <form action="cadastro.html">
            <fieldset>
                <legend>Cadastro do Cliente</legend>
                Nome: <input size="80" type="text" name="nome" id="nome" placeholder="Digite o nome do cliente"><br><br>
                Idade: <input size="12" type="text" name="idade" id="idade" placeholder="Digite a idade"><br><br>
                Endreço: <input size="100" type="text" name="endereco" id="endereco" placeholder="Digite o Endereço"><br><br>
                Cidade: <input size="70" type="text" name="cidade" id="cidade" placeholder="Digite a cidade"><br><br>
                Estado: <input size="2" type="text" name="uf" id="uf" placeholder="UF"><br><br>
                CEP: <input size="8" type="text" name="cep" id="cep" placeholder="XXXX-XXX"><br><br>
                Tel/Res: <input size="12" type="text" name="telefone" id="telefone" placeholder="99 99999-9999"><br><br>
                Tel/Cel: <input size="12" type="text" name="celular" id="celular" placeholder="99 99999-9999"><br><br>
                E-mail: <input size="100" type="text" name="email" id="email" placeholder="Digite o endereço de email"><br><br>
            </fieldset>
            <input type="submit" value="Enviar">
        </form>
    </body>
</html>
